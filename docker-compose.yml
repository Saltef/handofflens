services:
  demo:
    build:
      context: .
      target: demo
    ports:
      - "8080:80"
    profiles:
      - demo

  eval:
    build:
      context: .
      target: eval
    profiles:
      - eval
    command: ["npm", "run", "check:all"]

  benchmark:
    build:
      context: .
      target: eval
    volumes:
      - ./results:/app/results
      - ./benchmark_data:/benchmarks:ro
    profiles:
      - benchmark
    command: ["npm", "run", "benchmark:public:test"]
